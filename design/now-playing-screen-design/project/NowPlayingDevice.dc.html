<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0&display=swap" rel="stylesheet">
<style>
@keyframes np-dotpulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .3; transform: scale(.7); } }
@keyframes np-shimmer { 0% { background-position: 120% 0; } 100% { background-position: -20% 0; } }
</style>
</helmet>
<div style="position:relative;width:500px;height:500px;border-radius:54px;background:#0b0b0c;padding:10px;box-sizing:border-box;box-shadow:0 26px 64px rgba(26,20,16,.30),0 6px 18px rgba(26,20,16,.16);">
  <div style="position:relative;width:480px;height:480px;border-radius:44px;overflow:hidden;background:#FBF7F3;font-family:Inter,sans-serif;">

    <canvas ref="{{ canvasRef }}" width="480" height="480" style="position:absolute;inset:0;width:480px;height:480px;"></canvas>

    <div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:22px 24px 18px;box-sizing:border-box;">

      <div style="display:flex;justify-content:space-between;align-items:center;height:18px;flex:none;">
        <span style="font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#8A7A6E;">{{ source }}</span>
        <sc-if value="{{ isPlaying }}" hint-placeholder-val="{{ true }}">
          <span style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#A855F7;"><span style="width:7px;height:7px;border-radius:999px;background:#A855F7;animation:np-dotpulse 1.4s ease-in-out infinite;"></span>Playing</span>
        </sc-if>
        <sc-if value="{{ isDisc }}" hint-placeholder-val="{{ false }}">
          <span style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#C0392B;"><span style="width:7px;height:7px;border-radius:999px;background:#C0392B;"></span>Offline</span>
        </sc-if>
        <sc-if value="{{ mutedState }}" hint-placeholder-val="{{ false }}">
          <span style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#8A7A6E;"><span style="width:7px;height:7px;border-radius:999px;background:#B8A99A;"></span>{{ stateLabel }}</span>
        </sc-if>
      </div>

      <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;">
        <sc-if value="{{ stripedCover }}" hint-placeholder-val="{{ true }}">
          <div ref="{{ coverRef }}" style="width:128px;height:128px;border-radius:20px;border:1px solid #ECE2D8;background:repeating-linear-gradient(45deg,#F3EADF,#F3EADF 7px,#FBF7F3 7px,#FBF7F3 14px);box-shadow:0 10px 24px rgba(26,20,16,.14);display:flex;align-items:center;justify-content:center;">
            <sc-if value="{{ showCoverCaption }}" hint-placeholder-val="{{ true }}">
              <span style="font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#B8A99A;">cover</span>
            </sc-if>
          </div>
        </sc-if>
        <sc-if value="{{ gradientCover }}" hint-placeholder-val="{{ false }}">
          <div ref="{{ coverRef }}" style="width:128px;height:128px;border-radius:20px;background:linear-gradient(135deg,#6366F1,#A855F7,#EC4899);box-shadow:0 10px 26px rgba(168,85,247,.34);"></div>
        </sc-if>
      </div>

      <div style="text-align:center;flex:none;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:5px;">
        <sc-if value="{{ isBuffering }}" hint-placeholder-val="{{ false }}">
          <div style="width:170px;height:22px;border-radius:7px;background:linear-gradient(90deg,#EFE6DC 25%,#F7F0E8 45%,#EFE6DC 65%);background-size:220% 100%;animation:np-shimmer 1.3s ease-in-out infinite;"></div>
        </sc-if>
        <sc-if value="{{ isBuffering }}" hint-placeholder-val="{{ false }}">
          <div style="width:110px;height:14px;border-radius:6px;background:linear-gradient(90deg,#EFE6DC 25%,#F7F0E8 45%,#EFE6DC 65%);background-size:220% 100%;animation:np-shimmer 1.3s ease-in-out infinite;animation-delay:.15s;"></div>
        </sc-if>
        <sc-if value="{{ notBuffering }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:24px;font-weight:800;letter-spacing:-0.5px;line-height:1.12;color:#1A1410;max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ titleText }}</div>
        </sc-if>
        <sc-if value="{{ showArtist }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:15px;font-weight:500;color:#4A3F37;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ artistText }}</div>
        </sc-if>
        <sc-if value="{{ showAlbum }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:12px;font-weight:600;letter-spacing:.2px;color:#8A7A6E;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ albumText }}</div>
        </sc-if>
      </div>

      <sc-if value="{{ showProgress }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;gap:10px;flex:none;margin-top:6px;">
          <span style="font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:#8A7A6E;width:30px;text-align:left;">{{ elapsed }}</span>
          <div onClick="{{ onSeekBar }}" style="flex:1;height:16px;display:flex;align-items:center;cursor:pointer;">
            <div style="position:relative;width:100%;height:6px;border-radius:999px;background:#ECE2D8;">
              <div ref="{{ fillRef }}" style="position:absolute;left:0;top:0;height:6px;width:0%;border-radius:999px;background:linear-gradient(90deg,#6366F1,#A855F7,#EC4899);"></div>
            </div>
          </div>
          <span style="font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:#8A7A6E;width:30px;text-align:right;">{{ total }}</span>
        </div>
      </sc-if>

      <div style="display:flex;justify-content:space-between;align-items:center;flex:none;margin-top:14px;padding:0 2px;">
        <button onClick="{{ onDislike }}" style="width:48px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8A7A6E;-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:26px;font-variation-settings:'opsz' 24,'FILL' 0;">thumb_down</span>
        </button>
        <button onClick="{{ onPrev }}" style="width:48px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1A1410;-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:30px;font-variation-settings:'opsz' 24,'FILL' 1;">skip_previous</span>
        </button>
        <button onClick="{{ onToggle }}" style="width:66px;height:66px;border-radius:999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,#A855F7,#EC4899);box-shadow:0 10px 24px rgba(168,85,247,.42);-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:32px;font-variation-settings:'opsz' 40,'FILL' 1;">{{ playIcon }}</span>
        </button>
        <button onClick="{{ onNext }}" style="width:48px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1A1410;-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:30px;font-variation-settings:'opsz' 24,'FILL' 1;">skip_next</span>
        </button>
        <button onClick="{{ onLike }}" style="width:48px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;">
          <sc-if value="{{ favorite }}" hint-placeholder-val="{{ false }}">
            <span style="font-family:'Material Symbols Rounded';font-size:26px;color:#EC4899;font-variation-settings:'opsz' 24,'FILL' 1;">thumb_up</span>
          </sc-if>
          <sc-if value="{{ notFav }}" hint-placeholder-val="{{ true }}">
            <span style="font-family:'Material Symbols Rounded';font-size:26px;color:#8A7A6E;font-variation-settings:'opsz' 24,'FILL' 0;">thumb_up</span>
          </sc-if>
        </button>
      </div>

    </div>

    <sc-if value="{{ dimScrim }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;inset:0;background:rgba(251,247,243,.5);pointer-events:none;"></div>
    </sc-if>

    <sc-if value="{{ isDisc }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;left:18px;right:18px;bottom:84px;display:flex;align-items:center;gap:10px;background:#FFFFFF;border:1px solid #ECE2D8;border-radius:14px;padding:11px 13px;box-shadow:0 8px 22px rgba(26,20,16,.14);">
        <span style="width:8px;height:8px;border-radius:999px;background:#C0392B;flex:none;"></span>
        <span style="font-size:12px;font-weight:500;line-height:1.3;color:#4A3F37;">{{ bannerText }}</span>
      </div>
    </sc-if>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:500,&quot;height&quot;:500},&quot;mode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;playing&quot;,&quot;paused&quot;,&quot;buffering&quot;,&quot;empty&quot;,&quot;ad&quot;,&quot;disconnected&quot;],&quot;default&quot;:&quot;playing&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;source&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;YouTube Music&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Midnight Drive&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;artist&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;The Reverb Club&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;album&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Neon Nights · Album&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;favorite&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;position&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:72,&quot;tsType&quot;:&quot;number&quot;},&quot;duration&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:228,&quot;tsType&quot;:&quot;number&quot;},&quot;interactive&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onToggle&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onPrev&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onNext&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onLike&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onDislike&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onSeek&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(frac: number) =&gt; void&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.canvasRef = React.createRef();
    this.coverRef = React.createRef();
    this.fillRef = React.createRef();
    this.draw = this.draw.bind(this);
  }
  componentDidMount() {
    this.t0 = performance.now();
    this.ripples = [];
    this.noise = 0;
    this.lastRipple = 0;
    this.updateFill();
    this._raf = requestAnimationFrame(this.draw);
  }
  componentDidUpdate() { this.updateFill(); }
  componentWillUnmount() { cancelAnimationFrame(this._raf); }
  clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  fillPct() {
    const p = this.props;
    const d = Number(p.duration) || 0;
    if (!d) return 0;
    return this.clamp((Number(p.position) || 0) / d, 0, 1) * 100;
  }
  updateFill() { if (this.fillRef.current) this.fillRef.current.style.width = this.fillPct() + '%'; }
  reduced() { try { return window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) { return false; } }
  computeLevel(mode) {
    const t = (performance.now() - this.t0) / 1000;
    if (this.reduced()) return 0.15 + 0.05 * Math.sin(t * 1.2);
    if (mode === 'playing') {
      this.noise += (Math.random() - 0.5) * 0.12;
      this.noise *= 0.9;
      this.noise = this.clamp(this.noise, -0.25, 0.25);
      const l = 0.42 + 0.2 * Math.sin(t * 3.0) + 0.15 * Math.sin(t * 5.3 + 1) + 0.09 * Math.sin(t * 9.7 + 2) + this.noise * 0.6;
      return this.clamp(l, 0.05, 1);
    }
    if (mode === 'paused') return 0.16 + 0.06 * Math.sin(t * 1.4);
    return 0.05 + 0.02 * Math.sin(t * 0.9);
  }
  draw() {
    const cv = this.canvasRef.current;
    if (!cv) { this._raf = requestAnimationFrame(this.draw); return; }
    const dpr = window.devicePixelRatio || 1;
    const W = 480, H = 480;
    if (cv.width !== Math.round(W * dpr)) { cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr); }
    const ctx = cv.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    let cx = W / 2, cy = 168, cr = 64;
    const cover = this.coverRef.current;
    if (cover) {
      const cb = cover.getBoundingClientRect();
      const pb = cv.getBoundingClientRect();
      if (cb.width) { cx = cb.left - pb.left + cb.width / 2; cy = cb.top - pb.top + cb.height / 2; cr = cb.width / 2; }
    }
    const mode = this.props.mode || 'playing';
    const level = this.computeLevel(mode);
    const g = ctx.createLinearGradient(cx - 160, cy - 160, cx + 160, cy + 160);
    g.addColorStop(0, '#6366F1');
    g.addColorStop(0.5, '#A855F7');
    g.addColorStop(1, '#EC4899');
    ctx.strokeStyle = g;
    ctx.lineCap = 'round';
    const amps = [16, 11, 7], baseGap = 18, step = 22;
    for (let i = 0; i < 3; i++) {
      const r = cr + baseGap + i * step + amps[i] * level * 0.9;
      ctx.globalAlpha = (0.85 - i * 0.22) * (0.35 + 0.65 * level);
      ctx.lineWidth = 3.4 - i * 0.7;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    const now = performance.now() / 1000;
    if (mode === 'playing' && !this.reduced() && level > 0.7 && now - this.lastRipple > 0.3) {
      this.ripples.push({ r: cr + baseGap, life: 1 });
      this.lastRipple = now;
    }
    for (let i = this.ripples.length - 1; i >= 0; i--) {
      const rp = this.ripples[i];
      rp.r += 2.6;
      rp.life -= 0.02;
      if (rp.life <= 0) { this.ripples.splice(i, 1); continue; }
      ctx.globalAlpha = rp.life * 0.4;
      ctx.lineWidth = 2.2 * rp.life + 0.4;
      ctx.beginPath();
      ctx.arc(cx, cy, rp.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    this._raf = requestAnimationFrame(this.draw);
  }
  renderVals() {
    const p = this.props;
    const mode = p.mode || 'playing';
    const isPlaying = mode === 'playing', isPaused = mode === 'paused', isBuffering = mode === 'buffering';
    const isEmpty = mode === 'empty', isAd = mode === 'ad', isDisc = mode === 'disconnected';
    const fmt = (s) => { s = Math.max(0, Math.floor(Number(s) || 0)); const m = Math.floor(s / 60); const ss = s % 60; return m + ':' + (ss < 10 ? '0' : '') + ss; };
    const stateLabel = isPaused ? 'Paused' : isBuffering ? 'Buffering' : isEmpty ? 'Idle' : isAd ? 'Ad' : 'Playing';
    return {
      canvasRef: this.canvasRef, coverRef: this.coverRef, fillRef: this.fillRef,
      source: p.source || 'YouTube Music',
      isPlaying, isDisc, mutedState: isPaused || isBuffering || isEmpty || isAd, stateLabel,
      stripedCover: !(isEmpty || isAd), gradientCover: isEmpty || isAd, showCoverCaption: !(isEmpty || isAd),
      isBuffering, notBuffering: !isBuffering,
      titleText: isEmpty ? 'Nothing playing right now' : isAd ? 'Advertisement' : (p.title || 'Untitled'),
      showArtist: (isPlaying || isPaused || isDisc) && !!p.artist, artistText: p.artist || '',
      showAlbum: (isPlaying || isPaused || isDisc) && !!p.album, albumText: p.album || '',
      showProgress: !isEmpty, elapsed: fmt(p.position), total: fmt(p.duration),
      playIcon: (isPlaying || isBuffering) ? 'pause' : 'play_arrow',
      favorite: !!p.favorite, notFav: !p.favorite,
      onToggle: p.onToggle, onPrev: p.onPrev, onNext: p.onNext, onLike: p.onLike, onDislike: p.onDislike,
      onSeekBar: (e) => {
        if (!p.onSeek || !p.duration) return;
        const r = e.currentTarget.getBoundingClientRect();
        const frac = this.clamp((e.clientX - r.left) / r.width, 0, 1);
        p.onSeek(frac);
      },
      dimScrim: isAd || isDisc, isAd,
      bannerText: "Can't reach the Mac — check it's on and on the same network.",
    };
  }
}
</script>
</body>
</html>
