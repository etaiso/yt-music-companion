<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0&display=swap" rel="stylesheet">
<style>
@keyframes np2-dotpulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .3; transform: scale(.6); } }
@keyframes np2-shimmer { 0% { background-position: 120% 0; } 100% { background-position: -20% 0; } }
@keyframes np2-amb { 0% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.12) translate(-2%,1%); } 100% { transform: scale(1) translate(0,0); } }
</style>
</helmet>
<div style="position:relative;width:500px;height:500px;border-radius:54px;background:#070708;padding:10px;box-sizing:border-box;box-shadow:0 26px 64px rgba(0,0,0,.5),0 6px 18px rgba(0,0,0,.4);">
  <div style="position:relative;width:480px;height:480px;border-radius:44px;overflow:hidden;background:#070709;font-family:Inter,sans-serif;">

    <div style="position:absolute;inset:-12%;animation:np2-amb 14s ease-in-out infinite;background:{{ ambientBg }};"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,7,9,0) 28%,rgba(7,7,9,.55) 74%,rgba(7,7,9,.9) 100%);"></div>

    <canvas ref="{{ canvasRef }}" width="480" height="480" style="position:absolute;inset:0;width:480px;height:480px;"></canvas>

    <div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:24px 28px 22px;box-sizing:border-box;">

      <div style="display:flex;justify-content:space-between;align-items:center;height:20px;flex:none;">
        <span style="font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.6);">{{ source }}</span>
        <sc-if value="{{ isPlaying }}" hint-placeholder-val="{{ true }}">
          <span style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#FF4458;"><span style="width:8px;height:8px;border-radius:999px;background:#FF4458;box-shadow:0 0 10px rgba(255,68,88,.9);animation:np2-dotpulse 1.4s ease-in-out infinite;"></span>Playing</span>
        </sc-if>
        <sc-if value="{{ isDisc }}" hint-placeholder-val="{{ false }}">
          <span style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#FF6B6B;"><span style="width:8px;height:8px;border-radius:999px;background:#FF6B6B;"></span>Offline</span>
        </sc-if>
        <sc-if value="{{ mutedState }}" hint-placeholder-val="{{ false }}">
          <span style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.55);"><span style="width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.4);"></span>{{ stateLabel }}</span>
        </sc-if>
      </div>

      <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;">
        <sc-if value="{{ showMidnight }}" hint-placeholder-val="{{ true }}">
          <div ref="{{ coverRef }}" style="position:relative;width:172px;height:172px;border-radius:26px;overflow:hidden;background:radial-gradient(circle at 50% 36%, #EC4899 0%, rgba(236,72,153,0) 42%), linear-gradient(165deg,#312e81,#1e1b4b 58%,#0f0a2e);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 18px 40px rgba(0,0,0,.5);">
            <div style="position:absolute;top:32px;left:50%;transform:translateX(-50%);width:60px;height:60px;border-radius:999px;background:radial-gradient(circle at 38% 30%, #fce7f3, #f9a8d4 52%, #ec4899);box-shadow:0 0 36px rgba(236,72,153,.8);"></div>
            <div style="position:absolute;top:12px;left:15px;font-size:8px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.72);">The Reverb Club</div>
            <div style="position:absolute;left:15px;right:15px;bottom:13px;font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:.94;color:#fff;">Neon<br>Nights</div>
          </div>
        </sc-if>
        <sc-if value="{{ showTides }}" hint-placeholder-val="{{ false }}">
          <div ref="{{ coverRef }}" style="position:relative;width:172px;height:172px;border-radius:26px;overflow:hidden;background:linear-gradient(180deg,#67e8f9 0%,#22d3ee 34%,#0e7490 55%,#083344 55%,#155e75 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.24),0 18px 40px rgba(0,0,0,.5);">
            <div style="position:absolute;top:38px;left:50%;transform:translateX(-50%);width:52px;height:52px;border-radius:999px;background:radial-gradient(circle at 40% 34%, #fffbeb, #fde68a 60%, #fbbf24);box-shadow:0 0 30px rgba(253,224,138,.75);"></div>
            <div style="position:absolute;top:12px;left:15px;font-size:8px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:rgba(8,51,68,.8);">Marlowe Gray</div>
            <div style="position:absolute;left:15px;right:15px;bottom:13px;font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:.94;color:#ecfeff;">Coast<br>lines</div>
          </div>
        </sc-if>
        <sc-if value="{{ showLanterns }}" hint-placeholder-val="{{ false }}">
          <div ref="{{ coverRef }}" style="position:relative;width:172px;height:172px;border-radius:26px;overflow:hidden;background:linear-gradient(165deg,#7c2d12,#431407 68%,#1c0a02);box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 18px 40px rgba(0,0,0,.55);">
            <div style="position:absolute;top:30px;left:34px;width:18px;height:18px;border-radius:999px;background:radial-gradient(circle at 38% 30%, #fff7ed, #fbbf24 60%, #f97316);box-shadow:0 0 22px rgba(251,191,36,.85);"></div>
            <div style="position:absolute;top:54px;left:84px;width:22px;height:22px;border-radius:999px;background:radial-gradient(circle at 38% 30%, #fff7ed, #fbbf24 58%, #f97316);box-shadow:0 0 26px rgba(251,191,36,.9);"></div>
            <div style="position:absolute;top:40px;left:124px;width:14px;height:14px;border-radius:999px;background:radial-gradient(circle at 38% 30%, #fff7ed, #fbbf24 60%, #f97316);box-shadow:0 0 20px rgba(251,191,36,.8);"></div>
            <div style="position:absolute;top:12px;left:15px;font-size:8px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,237,213,.74);">Yumi &amp; the Hours</div>
            <div style="position:absolute;left:15px;right:15px;bottom:13px;font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:.94;color:#fff7ed;">Field<br>Notes</div>
          </div>
        </sc-if>
        <sc-if value="{{ gradientCover }}" hint-placeholder-val="{{ false }}">
          <div ref="{{ coverRef }}" style="width:172px;height:172px;border-radius:26px;background:linear-gradient(135deg,#3a3a3d,#1c1c1f);box-shadow:0 18px 40px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;">
            <span style="font-family:'Material Symbols Rounded';font-size:52px;color:rgba(255,255,255,.32);">music_note</span>
          </div>
        </sc-if>
      </div>

      <div style="text-align:center;flex:none;min-height:84px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;">
        <sc-if value="{{ isBuffering }}" hint-placeholder-val="{{ false }}">
          <div style="width:200px;height:26px;border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,.06) 25%,rgba(255,255,255,.16) 45%,rgba(255,255,255,.06) 65%);background-size:220% 100%;animation:np2-shimmer 1.3s ease-in-out infinite;"></div>
        </sc-if>
        <sc-if value="{{ isBuffering }}" hint-placeholder-val="{{ false }}">
          <div style="width:130px;height:16px;border-radius:7px;background:linear-gradient(90deg,rgba(255,255,255,.06) 25%,rgba(255,255,255,.16) 45%,rgba(255,255,255,.06) 65%);background-size:220% 100%;animation:np2-shimmer 1.3s ease-in-out infinite;animation-delay:.15s;"></div>
        </sc-if>
        <sc-if value="{{ notBuffering }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:29px;font-weight:800;letter-spacing:-0.6px;line-height:1.1;color:#fff;max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ titleText }}</div>
        </sc-if>
        <sc-if value="{{ showArtist }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:17px;font-weight:600;color:rgba(255,255,255,.72);max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ artistText }}</div>
        </sc-if>
        <sc-if value="{{ showAlbum }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:13px;font-weight:600;letter-spacing:.2px;color:rgba(255,255,255,.46);max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ albumText }}</div>
        </sc-if>
      </div>

      <sc-if value="{{ showProgress }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;gap:12px;flex:none;margin-top:8px;">
          <span style="font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,.55);width:34px;text-align:left;">{{ elapsed }}</span>
          <div onClick="{{ onSeekBar }}" style="flex:1;height:20px;display:flex;align-items:center;cursor:pointer;">
            <div style="position:relative;width:100%;height:7px;border-radius:999px;background:rgba(255,255,255,.18);">
              <div ref="{{ fillRef }}" style="position:absolute;left:0;top:0;height:7px;width:0%;border-radius:999px;background:#fff;"></div>
            </div>
          </div>
          <span style="font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,.55);width:34px;text-align:right;">{{ total }}</span>
        </div>
      </sc-if>

      <div style="display:flex;justify-content:space-between;align-items:center;flex:none;margin-top:16px;padding:0 2px;">
        <button onClick="{{ onDislike }}" style="width:56px;height:56px;border-radius:999px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:30px;font-variation-settings:'opsz' 24,'FILL' 0;">thumb_down</span>
        </button>
        <button onClick="{{ onPrev }}" style="width:56px;height:56px;border-radius:999px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:38px;font-variation-settings:'opsz' 40,'FILL' 1;">skip_previous</span>
        </button>
        <button onClick="{{ onToggle }}" style="width:80px;height:80px;border-radius:999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0a0a0b;background:#fff;box-shadow:0 12px 30px rgba(0,0,0,.45);-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:42px;font-variation-settings:'opsz' 40,'FILL' 1;">{{ playIcon }}</span>
        </button>
        <button onClick="{{ onNext }}" style="width:56px;height:56px;border-radius:999px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;-webkit-tap-highlight-color:transparent;">
          <span style="font-family:'Material Symbols Rounded';font-size:38px;font-variation-settings:'opsz' 40,'FILL' 1;">skip_next</span>
        </button>
        <button onClick="{{ onLike }}" style="width:56px;height:56px;border-radius:999px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;">
          <sc-if value="{{ favorite }}" hint-placeholder-val="{{ false }}">
            <span style="font-family:'Material Symbols Rounded';font-size:30px;color:#FF4458;font-variation-settings:'opsz' 24,'FILL' 1;">thumb_up</span>
          </sc-if>
          <sc-if value="{{ notFav }}" hint-placeholder-val="{{ true }}">
            <span style="font-family:'Material Symbols Rounded';font-size:30px;color:rgba(255,255,255,.6);font-variation-settings:'opsz' 24,'FILL' 0;">thumb_up</span>
          </sc-if>
        </button>
      </div>

    </div>

    <sc-if value="{{ isDisc }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;left:20px;right:20px;bottom:98px;display:flex;align-items:center;gap:11px;background:rgba(18,18,21,.92);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:13px 15px;box-shadow:0 10px 28px rgba(0,0,0,.5);backdrop-filter:blur(8px);">
        <span style="width:9px;height:9px;border-radius:999px;background:#FF6B6B;flex:none;box-shadow:0 0 10px rgba(255,107,107,.8);"></span>
        <span style="font-size:13px;font-weight:500;line-height:1.3;color:rgba(255,255,255,.82);">{{ bannerText }}</span>
      </div>
    </sc-if>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:500,&quot;height&quot;:500},&quot;mode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;playing&quot;,&quot;paused&quot;,&quot;buffering&quot;,&quot;empty&quot;,&quot;ad&quot;,&quot;disconnected&quot;],&quot;default&quot;:&quot;playing&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cover&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;midnight&quot;,&quot;tides&quot;,&quot;lanterns&quot;],&quot;default&quot;:&quot;midnight&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;source&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;YouTube Music&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Midnight Drive&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;artist&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;The Reverb Club&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;album&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Neon Nights · Album&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;favorite&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;position&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:72,&quot;tsType&quot;:&quot;number&quot;},&quot;duration&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:228,&quot;tsType&quot;:&quot;number&quot;},&quot;interactive&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onToggle&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onPrev&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onNext&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onLike&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onDislike&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onSeek&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(frac: number) =&gt; void&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.canvasRef = React.createRef();
    this.coverRef = React.createRef();
    this.fillRef = React.createRef();
    this.draw = this.draw.bind(this);
  }
  componentDidMount() {
    this.t0 = performance.now();
    this.ripples = [];
    this.noise = 0;
    this.lastRipple = 0;
    this.updateFill();
    this._raf = requestAnimationFrame(this.draw);
  }
  componentDidUpdate() { this.updateFill(); }
  componentWillUnmount() { cancelAnimationFrame(this._raf); }
  clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  palette() {
    const c = this.props.cover || 'midnight';
    const map = {
      midnight: ['#818cf8', '#c084fc', '#f472b6'],
      tides: ['#67e8f9', '#22d3ee', '#a78bfa'],
      lanterns: ['#fcd34d', '#fb923c', '#f87171'],
    };
    return map[c] || ['#9ca3af', '#d1d5db', '#9ca3af'];
  }
  fillPct() {
    const p = this.props;
    const d = Number(p.duration) || 0;
    if (!d) return 0;
    return this.clamp((Number(p.position) || 0) / d, 0, 1) * 100;
  }
  updateFill() { if (this.fillRef.current) this.fillRef.current.style.width = this.fillPct() + '%'; }
  reduced() { try { return window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) { return false; } }
  computeLevel(mode) {
    const t = (performance.now() - this.t0) / 1000;
    if (this.reduced()) return 0.15 + 0.05 * Math.sin(t * 1.2);
    if (mode === 'playing') {
      this.noise += (Math.random() - 0.5) * 0.12;
      this.noise *= 0.9;
      this.noise = this.clamp(this.noise, -0.25, 0.25);
      const l = 0.42 + 0.2 * Math.sin(t * 3.0) + 0.15 * Math.sin(t * 5.3 + 1) + 0.09 * Math.sin(t * 9.7 + 2) + this.noise * 0.6;
      return this.clamp(l, 0.05, 1);
    }
    if (mode === 'paused') return 0.16 + 0.06 * Math.sin(t * 1.4);
    return 0.05 + 0.02 * Math.sin(t * 0.9);
  }
  draw() {
    const cv = this.canvasRef.current;
    if (!cv) { this._raf = requestAnimationFrame(this.draw); return; }
    const dpr = window.devicePixelRatio || 1;
    const W = 480, H = 480;
    if (cv.width !== Math.round(W * dpr)) { cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr); }
    const ctx = cv.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    let cx = W / 2, cy = 188, cr = 86;
    const cover = this.coverRef.current;
    if (cover) {
      const cb = cover.getBoundingClientRect();
      const pb = cv.getBoundingClientRect();
      if (cb.width) { cx = cb.left - pb.left + cb.width / 2; cy = cb.top - pb.top + cb.height / 2; cr = cb.width / 2; }
    }
    const mode = this.props.mode || 'playing';
    const level = this.computeLevel(mode);
    const pal = this.palette();
    const g = ctx.createLinearGradient(cx - 170, cy - 170, cx + 170, cy + 170);
    g.addColorStop(0, pal[0]);
    g.addColorStop(0.5, pal[1]);
    g.addColorStop(1, pal[2]);
    ctx.strokeStyle = g;
    ctx.lineCap = 'round';
    const amps = [18, 12, 8], baseGap = 20, step = 24;
    for (let i = 0; i < 3; i++) {
      const r = cr + baseGap + i * step + amps[i] * level * 0.9;
      ctx.globalAlpha = (0.8 - i * 0.2) * (0.4 + 0.6 * level);
      ctx.lineWidth = 3.6 - i * 0.7;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    const now = performance.now() / 1000;
    if (mode === 'playing' && !this.reduced() && level > 0.7 && now - this.lastRipple > 0.3) {
      this.ripples.push({ r: cr + baseGap, life: 1 });
      this.lastRipple = now;
    }
    for (let i = this.ripples.length - 1; i >= 0; i--) {
      const rp = this.ripples[i];
      rp.r += 2.8;
      rp.life -= 0.02;
      if (rp.life <= 0) { this.ripples.splice(i, 1); continue; }
      ctx.globalAlpha = rp.life * 0.4;
      ctx.lineWidth = 2.4 * rp.life + 0.4;
      ctx.beginPath();
      ctx.arc(cx, cy, rp.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    this._raf = requestAnimationFrame(this.draw);
  }
  ambient() {
    const p = this.props;
    const mode = p.mode || 'playing';
    if (mode === 'empty' || mode === 'ad' || mode === 'disconnected') {
      return 'radial-gradient(120% 80% at 50% 6%, #2a2a2e 0%, rgba(42,42,46,0) 60%), linear-gradient(180deg,#141416,#0a0a0b 70%,#070709)';
    }
    const c = p.cover || 'midnight';
    const map = {
      midnight: 'radial-gradient(120% 78% at 50% 4%, #6d28d9 0%, rgba(109,40,217,0) 56%), radial-gradient(90% 60% at 78% 26%, #ec4899 0%, rgba(236,72,153,0) 50%), linear-gradient(180deg,#1b1336,#0b0718 68%,#060410)',
      tides: 'radial-gradient(120% 78% at 50% 4%, #0891b2 0%, rgba(8,145,178,0) 56%), radial-gradient(82% 58% at 74% 24%, #22d3ee 0%, rgba(34,211,238,0) 48%), linear-gradient(180deg,#06242e,#03141b 68%,#020b0e)',
      lanterns: 'radial-gradient(120% 78% at 50% 4%, #c2410c 0%, rgba(194,65,12,0) 56%), radial-gradient(82% 58% at 70% 28%, #f59e0b 0%, rgba(245,158,11,0) 48%), linear-gradient(180deg,#2b1408,#160903 68%,#0a0402)',
    };
    return map[c] || map.midnight;
  }
  renderVals() {
    const p = this.props;
    const mode = p.mode || 'playing';
    const isPlaying = mode === 'playing', isPaused = mode === 'paused', isBuffering = mode === 'buffering';
    const isEmpty = mode === 'empty', isAd = mode === 'ad', isDisc = mode === 'disconnected';
    const fmt = (s) => { s = Math.max(0, Math.floor(Number(s) || 0)); const m = Math.floor(s / 60); const ss = s % 60; return m + ':' + (ss < 10 ? '0' : '') + ss; };
    const stateLabel = isPaused ? 'Paused' : isBuffering ? 'Buffering' : isEmpty ? 'Idle' : isAd ? 'Ad' : 'Playing';
    return {
      canvasRef: this.canvasRef, coverRef: this.coverRef, fillRef: this.fillRef,
      ambientBg: this.ambient(),
      source: p.source || 'YouTube Music',
      isPlaying, isDisc, mutedState: isPaused || isBuffering || isEmpty || isAd, stateLabel,
      gradientCover: isEmpty || isAd,
      showMidnight: !(isEmpty || isAd) && (p.cover || 'midnight') === 'midnight',
      showTides: !(isEmpty || isAd) && p.cover === 'tides',
      showLanterns: !(isEmpty || isAd) && p.cover === 'lanterns',
      isBuffering, notBuffering: !isBuffering,
      titleText: isEmpty ? 'Nothing playing' : isAd ? 'Advertisement' : (p.title || 'Untitled'),
      showArtist: (isPlaying || isPaused || isDisc) && !!p.artist, artistText: p.artist || '',
      showAlbum: (isPlaying || isPaused || isDisc) && !!p.album, albumText: p.album || '',
      showProgress: !isEmpty, elapsed: fmt(p.position), total: fmt(p.duration),
      playIcon: (isPlaying || isBuffering) ? 'pause' : 'play_arrow',
      favorite: !!p.favorite, notFav: !p.favorite,
      onToggle: p.onToggle, onPrev: p.onPrev, onNext: p.onNext, onLike: p.onLike, onDislike: p.onDislike,
      onSeekBar: (e) => {
        if (!p.onSeek || !p.duration) return;
        const r = e.currentTarget.getBoundingClientRect();
        const frac = this.clamp((e.clientX - r.left) / r.width, 0, 1);
        p.onSeek(frac);
      },
      bannerText: "Can't reach your computer — check it's on and on the same network.",
    };
  }
}
</script>
</body>
</html>
