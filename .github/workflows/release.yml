name: Release firmware

# On a version tag (e.g. v1.0.0), build the firmware and attach the single-file
# ytm-firmware.bin to a GitHub Release as a versioned, downloadable archive.
# This is independent of pages.yml (which serves the bin from the live installer
# site); it does NOT deploy Pages, so there is no single-deployment conflict.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware + merge single-file image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: esp32s3
          path: firmware
          # merge-bin resolves -o relative to the build dir (firmware/build), so
          # two levels up writes ytm-firmware.bin at the repo root for the next step.
          command: idf.py build && idf.py merge-bin -o ../../ytm-firmware.bin

      - name: Create or update the release with the firmware asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          test -f ytm-firmware.bin
          # Create the release if it doesn't exist yet; otherwise just (re)upload
          # the asset. --clobber makes re-runs idempotent.
          gh release create "$TAG" ytm-firmware.bin \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
          || gh release upload "$TAG" ytm-firmware.bin \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  app:
    name: Build bridge app (${{ matrix.os }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # arm64
            args: "--target aarch64-apple-darwin"
          - os: macos-latest # x64
            args: "--target x86_64-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS target
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      # tauri-action uploads to the release for this tag; the firmware `release`
      # job above (needs: release) creates it first, so this only attaches
      # the platform installer as an additional asset. No code signing: builds
      # are unsigned per the design's non-goals.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app/src-tauri
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: ${{ github.event.inputs.tag || github.ref_name }}
          args: ${{ matrix.args }}
